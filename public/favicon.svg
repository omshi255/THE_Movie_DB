<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Main board body -->
  <rect x="3" y="10" width="26" height="19" rx="2" fill="#1a1a2e"/>
  <!-- White top bar -->
  <rect x="3" y="5" width="26" height="7" rx="2" fill="#ffffff"/>
  <!-- Black diagonal stripes on top bar -->
  <clipPath id="clip">
    <rect x="3" y="5" width="26" height="7" rx="2"/>
  </clipPath>
  <g clip-path="url(#clip)">
    <rect x="3" y="5" width="5" height="7" fill="#1a1a2e"/>
    <rect x="11" y="5" width="5" height="7" fill="#1a1a2e"/>
    <rect x="19" y="5" width="5" height="7" fill="#1a1a2e"/>
    <rect x="27" y="5" width="5" height="7" fill="#1a1a2e"/>
  </g>
  <!-- Hinge line -->
  <line x1="3" y1="12" x2="29" y2="12" stroke="#555" stroke-width="0.5"/>
  <!-- Play triangle on board body -->
  <polygon points="12,16 12,26 23,21" fill="#01B4E4"/>
</svg>
